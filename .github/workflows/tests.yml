name: Unit tests
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [created]
  workflow_dispatch:

concurrency:
  group: Build ${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  #############
  # Run tests
  #############
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: PHP ${{ matrix.php-version }} + ${{ matrix.connection }}

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.5']
        connection: [sqlite, mysql, pgsql]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, dom, fileinfo, ${{ matrix.connection }}
          coverage: none

      - name: Check PHP Version
        run: php -v

      - name: Check Composer Version
        run: composer -V

      - name: Check PHP Extensions
        run: php -m

      # Composer
      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer files
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php-version }}
            ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      # Prepare
      - name: Prepare environment
        run: |
          cp tests/.env.ci.${{ matrix.connection }} .env
          mkdir -p public/build/assets
          {\
            echo "{"; \
            for f in app.js app.css marketing.js marketing.css; do \
              [[ $first == 1 ]] && echo -n "," || first=1; \
              k=${f##*.}/$f; \
              echo "\"resources/$k\": {\"file\": \"assets/$f\", \"src\": \"resources/$k\"}"; \
              echo '' > public/build/assets/$f; \
            done; \
            echo "}"; \
          } | tee public/build/manifest.json

      - name: Create sqlite database
        if: matrix.connection == 'sqlite'
        run: touch database/database.sqlite

      - name: Create mysql database
        if: matrix.connection == 'mysql'
        run: |
          sudo systemctl start mysql.service
          mysql --protocol=tcp -u root -proot -e "CREATE DATABASE IF NOT EXISTS beaver CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Create pgsql database
        if: matrix.connection == 'pgsql'
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql --command="CREATE USER beaver PASSWORD 'secret'" --command="\du"
          sudo -u postgres psql --command="ALTER USER beaver CREATEDB"
          sudo -u postgres createdb --owner=beaver beaver
          PGPASSWORD=secret psql --username=beaver --host=localhost --list beaver

      - name: Generate key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --no-interaction -vvv

      - name: Run tests
        if: matrix.connection == 'sqlite'
        run: php artisan test --parallel
        env:
          DB_CONNECTION: ${{ matrix.connection }}

      - name: Run tests (mysql)
        if: matrix.connection == 'mysql'
        run: php artisan test --parallel
        env:
          DB_CONNECTION: ${{ matrix.connection }}

      - name: Run tests (pgsql)
        if: matrix.connection == 'pgsql'
        run: php artisan test --parallel --recreate-databases
        env:
          DB_CONNECTION: ${{ matrix.connection }}

  ####################
  # Run browser tests
  ####################
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Browser tests (Playwright)

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, sqlite
          coverage: none

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer files
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-8.5-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.5
            ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Install JS dependencies
        run: bun install

      - name: Build assets
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Prepare environment
        run: |
          cp tests/.env.ci.sqlite .env
          touch database/database.sqlite

      - name: Generate key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --no-interaction

      - name: Run browser tests
        run: php artisan test tests/Browser
        env:
          DB_CONNECTION: sqlite
