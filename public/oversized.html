<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>File too large</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .card {
            width: 100%;
            max-width: 30rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        .icon {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            background: rgba(220, 38, 38, 0.1);
            color: #dc2626;
            font-size: 1.5rem;
        }
        h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
        p { margin: 0 0 1.5rem; line-height: 1.6; color: #475569; font-size: 0.95rem; }
        a {
            display: inline-block;
            padding: 0.6rem 1.25rem;
            border-radius: 0.5rem;
            background: #0f172a;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0f172a; color: #f1f5f9; }
            .card { background: #1e293b; border-color: #334155; box-shadow: none; }
            p { color: #94a3b8; }
            a { background: #f1f5f9; color: #0f172a; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">!</div>
        <h1>That file is too large</h1>
        <p>The file you tried to upload is bigger than what we accept. Please choose a smaller file and try again.</p>
        <a href="javascript:history.back()">Go back</a>
    </div>
</body>
</html>
