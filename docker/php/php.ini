# Production PHP settings for the KolleK runtime image.

expose_php = Off
memory_limit = 256M

; Item photos are validated up to 10 MB; leave headroom for the multipart body.
upload_max_filesize = 12M
post_max_size = 15M
max_file_uploads = 20

max_execution_time = 60
max_input_time = 60

; Log to the container's stderr so `docker logs` captures PHP errors.
display_errors = Off
log_errors = On
error_log = /dev/stderr

date.timezone = UTC
realpath_cache_size = 4096K
realpath_cache_ttl = 600
