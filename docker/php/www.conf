; PHP-FPM pool for the KolleK runtime image.

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Do not strip the container environment: Laravel reads its configuration from
; the variables injected by Docker.
clear_env = no

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Surface worker output through the container logs.
catch_workers_output = yes
decorate_workers_output = no

; Expose /up quickly even under load.
pm.status_path = /fpm-status
ping.path = /fpm-ping
